<!DOCTYPE html>
<html>
<head>
    <title>HSA Horizon</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 30px;
            max-width: 1050px;
            margin: auto;
            background: linear-gradient(180deg, #ffd6b3, #6495ED);
            color: black;
        }

        h2, h3 { color: black; }

        input, select {
            padding: 8px;
            font-size: 16px;
            width: 200px;
            border-radius: 8px;
            border: 1px solid #d0b8a8;
            background: #fff;
        }

        .input-group {
            margin-bottom: 15px;
            background: #fffaf5;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #f0d8c5;
        }

        .info-box {
            background: #f0f7ff;
            padding: 10px;
            border-left: 4px solid #5b8bd0;
            margin-top: 10px;
            font-size: 14px;
            border-radius: 8px;
        }

        .warning-box {
            background: #ffe3e3;
            color: #900;
            padding: 12px;
            border-left: 5px solid red;
            margin-top: 15px;
            font-weight: bold;
            display: none;
            border-radius: 8px;
        }

        button {
            padding: 8px 14px;
            font-size: 14px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
            background: #ff8a5c;
            color: white;
            cursor: pointer;
        }

        canvas {
            margin-top: 40px;
            background: white;
            border-radius: 12px;
            padding: 10px;
        }

        /* Lever Switch */
        .switch {
            position: relative;
            width: 50px;
            height: 26px;
            display: inline-block;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: #ccc;
            border-radius: 26px;
            transition: 0.3s;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            border-radius: 50%;
            transition: 0.3s;
        }

        input:checked + .slider {
            background-color: #ff8a5c;
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        .toggle-table {
            margin-top: 20px;
            border-collapse: collapse;
            width: 100%;
            background: #fffaf5;
            border-radius: 12px;
            overflow: hidden;
        }

        .toggle-table th {
            background: #ffb07c;
            color: white;
            padding: 10px;
        }

        .toggle-table td {
            padding: 10px;
            border: 1px solid #f0d8c5;
            text-align: center;
        }

        .row-label {
            text-align: left;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2>HSA Horizon</h2>

<h3>Recommendation Survey</h3>

<div class="input-group">
    <label>Education Level:</label>
    <select id="A5_2015">
        <option>Bachelor's degree</option>
        <option>High school</option>
        <option>Some college</option>
        <option>Graduate degree</option>
    </select>
</div>

<div class="input-group">
    <label>Employment Status:</label>
    <select id="A9">
        <option>Student</option>
        <option>Employed</option>
        <option>Unemployed</option>
        <option>Retired</option>
    </select>
</div>

<div class="input-group">
    <label>Financial Satisfaction:</label>
    <select id="J1">
        <option>1</option><option>2</option>
        <option>3</option><option>4</option>
        <option>5</option>
    </select>
</div>

<div class="input-group">
    <label>Risk Tolerance:</label>
    <select id="J2">
        <option>1</option><option>2</option>
        <option>3</option><option>4</option>
        <option>5</option>
    </select>
</div>

<div class="input-group">
    <label>Difficulty Paying Bills:</label>
    <select id="J4">
        <option>Rarely</option>
        <option>Sometimes</option>
        <option>Often</option>
    </select>
</div>

<div class="input-group">
    <label>Emergency Savings:</label>
    <select id="J5">
        <option>Yes</option>
        <option>No</option>
    </select>
</div>

<div class="input-group">
    <label>Health Insurance:</label>
    <select id="H1">
        <option>Yes</option>
        <option>No</option>
    </select>
</div>

<div class="input-group">
    <label>Credit Cards (1-5):</label>
    <select id="F1">
        <option>1</option><option>2</option>
        <option>3</option><option>4</option>
        <option>5</option>
    </select>
</div>

<div class="input-group">
    <label>Debt Perception (1-5):</label>
    <select id="G23">
        <option>1</option><option>2</option>
        <option>3</option><option>4</option>
        <option>5</option>
    </select>
</div>

<button onclick="submitSurvey()">Get Recommended HSA Contribution</button>

<div class="info-box" id="predictionBox"></div>

<h3>Simulation Inputs (Auto-Updated)</h3>

<div class="input-group">
    <label>Initial Savings ($):</label>
    <input type="number" id="initialSavings" value="6500" step="0.01">
</div>

<div class="input-group">
    <label>Paycheck Amount (Bi-Weekly $):</label>
    <input type="number" id="paycheckAmount" value="900" step="0.01">
</div>

<div class="input-group">
    <label>HSA Contribution (Per Paycheck $):</label>
    <input type="number" id="hsaContribution" value="150" step="0.01">
</div>

<div class="info-box" id="hsaInfo"></div>
<div id="hsaWarning" class="warning-box"></div>

<h3>Medical Expenses (Lever Toggles)</h3>

<table class="toggle-table">
    <thead>
        <tr>
            <th>Medical Category</th>
            <th>Insured</th>
            <th>Uninsured</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td class="row-label">Dental</td>
            <td><label class="switch"><input type="checkbox" id="dentalWith"><span class="slider"></span></label></td>
            <td><label class="switch"><input type="checkbox" id="dentalWithout"><span class="slider"></span></label></td>
        </tr>
        <tr>
            <td class="row-label">Vision</td>
            <td><label class="switch"><input type="checkbox" id="visionWith"><span class="slider"></span></label></td>
            <td><label class="switch"><input type="checkbox" id="visionWithout"><span class="slider"></span></label></td>
        </tr>
        <tr>
            <td class="row-label">Prescriptions</td>
            <td><label class="switch"><input type="checkbox" id="rxWith"><span class="slider"></span></label></td>
            <td><label class="switch"><input type="checkbox" id="rxWithout"><span class="slider"></span></label></td>
        </tr>
        <tr>
            <td class="row-label">Mental Health</td>
            <td><label class="switch"><input type="checkbox" id="mhWith"><span class="slider"></span></label></td>
            <td><label class="switch"><input type="checkbox" id="mhWithout"><span class="slider"></span></label></td>
        </tr>
        <tr>
            <td class="row-label">Physical Therapy</td>
            <td><label class="switch"><input type="checkbox" id="ptWith"><span class="slider"></span></label></td>
            <td><label class="switch"><input type="checkbox" id="ptWithout"><span class="slider"></span></label></td>
        </tr>
        <tr>
            <td class="row-label">Chronic Condition</td>
            <td><label class="switch"><input type="checkbox" id="ccWith"><span class="slider"></span></label></td>
            <td><label class="switch"><input type="checkbox" id="ccWithout"><span class="slider"></span></label></td>
        </tr>
    </tbody>
</table>

<canvas id="barChart"></canvas>

<script>
const paychecksPerYear = 26;
const projectionYears = [1, 5, 10, 15, 20];

let predictionTable = {};

async function loadTable() {
    try {
        const res = await fetch("prediction_table_full.json");
        predictionTable = await res.json();
    } catch (e) {
        console.error("Prediction table not found.");
    }
}

function buildKey() {
    return [
        document.getElementById("A5_2015").value,
        document.getElementById("A9").value,
        document.getElementById("J1").value,
        document.getElementById("J2").value,
        document.getElementById("J4").value,
        document.getElementById("J5").value,
        document.getElementById("H1").value,
        document.getElementById("F1").value,
        document.getElementById("G23").value
    ].join("|");
}

function submitSurvey() {
    const key = buildKey();
    const predicted = predictionTable[key];

    if (predicted === undefined) {
        document.getElementById("predictionBox").innerHTML =
            "No prediction available for this combination.";
        return;
    }

    document.getElementById("predictionBox").innerHTML =
        `<strong>Recommended HSA Contribution:</strong> $${predicted} per paycheck`;

    document.getElementById("hsaContribution").value = predicted;
    updateChart();
}

function updateInfoBox() {
    const hsa = parseFloat(document.getElementById("hsaContribution").value) || 0;
    const pay = parseFloat(document.getElementById("paycheckAmount").value) || 1;
    const percent = (hsa / pay) * 100;
    const monthly = hsa * paychecksPerYear / 12;
    const yearly = hsa * paychecksPerYear;

    document.getElementById("hsaInfo").innerHTML = `
        <strong>HSA Contribution Breakdown:</strong><br>
        Percent of paycheck: ${percent.toFixed(2)}%<br>
        Monthly: $${monthly.toFixed(2)}<br>
        Annual: $${yearly.toFixed(2)}
    `;
}

function getMedicalAnnualCost() {
    let total = 0;
    const ranges = {
        dentalWith: [240, 600],
        dentalWithout: [200, 600],
        visionWith: [25, 25],
        visionWithout: [75, 250],
        rxWith: [10, 50],
        rxWithout: [30, 200],
        mhWith: [0, 50],
        mhWithout: [100, 200],
        ptWith: [10, 50],
        ptWithout: [75, 350],
        ccWith: [3000, 6000],
        ccWithout: [3000, 10000]
    };

    Object.keys(ranges).forEach(id => {
        const box = document.getElementById(id);
        if (box && box.checked) {
            const [low, high] = ranges[id];
            total += Math.random() * (high - low) + low;
        }
    });

    return total;
}

function projectBalances(years, initialSavings, paycheckAmount, hsaContribution) {
    let savings = initialSavings;
    let hsa = 0;

    for (let i = 0; i < years; i++) {
        let yearlyHSA = hsaContribution * paychecksPerYear;
        let medicalCost = getMedicalAnnualCost();
        let remainingAfterHSA = (paycheckAmount - hsaContribution) * paychecksPerYear;
        let yearlySavingsFromRule = remainingAfterHSA * 0.10;

        hsa = (hsa + yearlyHSA - medicalCost);
        savings = (savings + yearlySavingsFromRule);
    }

    return { savings, hsa };
}

function updateChart() {
    updateInfoBox();

    let savingsData = [];
    let hsaData = [];

    projectionYears.forEach(year => {
        let result = projectBalances(
            year,
            parseFloat(document.getElementById("initialSavings").value),
            parseFloat(document.getElementById("paycheckAmount").value),
            parseFloat(document.getElementById("hsaContribution").value)
        );

        savingsData.push(result.savings.toFixed(2));
        hsaData.push(result.hsa.toFixed(2));
    });

    chart.data.datasets[0].data = savingsData;
    chart.data.datasets[1].data = hsaData;
    chart.update();
}

document.querySelectorAll("input, select").forEach(el => {
    el.addEventListener("input", updateChart);
});

let chart = new Chart(document.getElementById("barChart").getContext("2d"), {
    type: "bar",
    data: {
        labels: projectionYears.map(y => y + " Year"),
        datasets: [
            { label: "Savings", data: [], backgroundColor: "#ffb07c" },
            { label: "HSA", data: [], backgroundColor: "#5b8bd0" }
        ]
    },
    options: { responsive: true, scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } } }
});

loadTable().then(updateChart);
</script>

</body>
</html>
