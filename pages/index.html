<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FinHealth</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      padding: 2rem;
    }
    .iphone {
      width: 390px; height: 844px;
      background: #111; border-radius: 54px;
      border: 2px solid #444;
      box-shadow: 0 0 0 1px #222, 0 30px 80px rgba(0,0,0,0.7), inset 0 0 0 2px #333;
      position: relative; overflow: hidden; flex-shrink: 0;
    }
    .iphone::before {
      content: ''; position: absolute; left: -4px; top: 160px;
      width: 4px; height: 36px; background: #333; border-radius: 2px 0 0 2px;
      box-shadow: 0 52px 0 #333, 0 96px 0 #333;
    }
    .iphone::after {
      content: ''; position: absolute; right: -4px; top: 200px;
      width: 4px; height: 72px; background: #333; border-radius: 0 2px 2px 0;
    }
    .screen {
      position: absolute; inset: 0; border-radius: 52px;
      overflow: hidden; background: #fff;
      display: flex; flex-direction: column;
    }
    .dynamic-island {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      width: 126px; height: 36px; background: #000; border-radius: 20px; z-index: 50;
    }
    .status-bar {
      height: 54px; padding: 14px 28px 0;
      display: flex; justify-content: space-between; align-items: flex-end;
      flex-shrink: 0; z-index: 10;
    }
    .status-time { font-size: 15px; font-weight: 600; color: #000; font-family: 'Inter', sans-serif; }
    .status-icons { display: flex; gap: 5px; align-items: center; }
    .s-sig  { width: 12px; height: 10px; background: #333; border-radius: 2px; }
    .s-wifi { width: 14px; height: 10px; background: #333; border-radius: 2px; }
    .s-bat  { width: 22px; height: 10px; border: 1.5px solid #333; border-radius: 3px; position: relative; }
    .s-bat::after { content: ''; position: absolute; top: 1px; left: 1px; right: 4px; bottom: 1px; background: #333; border-radius: 1px; }
    .content {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; padding: 0 32px 48px;
    }
    .welcome { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .app-name { font-size: 30px; font-weight: 700; color: #000; margin-bottom: 10px; }
    .tagline { font-size: 15px; color: #555; margin-bottom: 32px; line-height: 1.5; }
    .learn-label { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }
    .learn-list { list-style: none; display: flex; flex-direction: column; gap: 12px; margin-bottom: 44px; }
    .learn-list li { display: flex; align-items: center; gap: 12px; font-size: 15px; color: #222; }
    .bullet { width: 8px; height: 8px; border-radius: 50%; background: #007aff; flex-shrink: 0; }
    .get-started {
      display: block; width: 100%; padding: 16px;
      background: #007aff; color: #fff;
      border: none; border-radius: 16px;
      font-size: 16px; font-weight: 600;
      text-align: center; text-decoration: none;
      font-family: 'Inter', sans-serif;
    }
    .home-ind {
      position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      width: 134px; height: 5px;
      background: rgba(0,0,0,0.2); border-radius: 3px; z-index: 30;
    }
  </style>
</head>
<body>
  <div class="iphone">
    <div class="screen">
      <div class="dynamic-island"></div>
      <div class="status-bar">
        <span class="status-time">9:41</span>
        <div class="status-icons">
          <div class="s-sig"></div><div class="s-wifi"></div><div class="s-bat"></div>
        </div>
      </div>
      <div class="content">
        <div class="welcome">Welcome to</div>
        <div class="app-name">FinHealth</div>
        <div class="tagline">Simulate HSA decisions without risk</div>
        <div class="learn-label">Learn how to</div>
        <ul class="learn-list">
          <li><div class="bullet"></div>Budget and allocate your income</li>
          <li><div class="bullet"></div>Make confident HSA decisions</li>
          <li><div class="bullet"></div>Plan for your financial future</li>
        </ul>
        <a href="priorities.html" class="get-started">Get Started</a>
      </div>
      <div class="home-ind"></div>
    </div>
  </div>
</body>
</html>
