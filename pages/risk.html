<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FinHealth – Risk</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      padding: 2rem;
    }
    .iphone {
      width: 390px; height: 844px;
      background: #111; border-radius: 54px;
      border: 2px solid #444;
      box-shadow: 0 0 0 1px #222, 0 30px 80px rgba(0,0,0,0.7), inset 0 0 0 2px #333;
      position: relative; overflow: hidden; flex-shrink: 0;
    }
    .iphone::before {
      content: ''; position: absolute; left: -4px; top: 160px;
      width: 4px; height: 36px; background: #333; border-radius: 2px 0 0 2px;
      box-shadow: 0 52px 0 #333, 0 96px 0 #333;
    }
    .iphone::after {
      content: ''; position: absolute; right: -4px; top: 200px;
      width: 4px; height: 72px; background: #333; border-radius: 0 2px 2px 0;
    }
    .screen {
      position: absolute; inset: 0; border-radius: 52px;
      overflow: hidden; background: #fff;
      display: flex; flex-direction: column;
    }
    .dynamic-island {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      width: 126px; height: 36px; background: #000; border-radius: 20px; z-index: 50;
    }
    .status-bar {
      height: 54px; padding: 14px 28px 0;
      display: flex; justify-content: space-between; align-items: flex-end;
      flex-shrink: 0; z-index: 10;
    }
    .status-time { font-size: 15px; font-weight: 600; color: #000; font-family: 'Inter', sans-serif; }
    .status-icons { display: flex; gap: 5px; align-items: center; }
    .s-sig  { width: 12px; height: 10px; background: #333; border-radius: 2px; }
    .s-wifi { width: 14px; height: 10px; background: #333; border-radius: 2px; }
    .s-bat  { width: 22px; height: 10px; border: 1.5px solid #333; border-radius: 3px; position: relative; }
    .s-bat::after { content: ''; position: absolute; top: 1px; left: 1px; right: 4px; bottom: 1px; background: #333; border-radius: 1px; }
    .content {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; padding: 0 32px 48px;
    }
    .back-btn {
      position: absolute; top: 68px; left: 24px;
      color: #007aff; font-size: 14px; text-decoration: none; font-family: 'Inter', sans-serif;
    }
    .step-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .heading { font-size: 26px; font-weight: 700; color: #000; margin-bottom: 8px; line-height: 1.25; }
    .subheading { font-size: 14px; color: #888; margin-bottom: 36px; line-height: 1.5; }
    .risk-display { text-align: center; margin-bottom: 32px; }
    .risk-label { font-size: 20px; font-weight: 700; color: #000; margin-bottom: 4px; }
    .risk-desc  { font-size: 13px; color: #888; line-height: 1.5; }
    .slider-wrap { margin-bottom: 12px; }
    input[type=range] {
      -webkit-appearance: none;
      width: 100%; height: 6px;
      border-radius: 4px; outline: none; cursor: pointer;
      background: linear-gradient(to right, #007aff 50%, #e0e0e5 50%);
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 28px; height: 28px; border-radius: 50%;
      background: #fff; border: 3px solid #007aff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2); cursor: grab;
    }
    input[type=range]::-webkit-slider-thumb:active { cursor: grabbing; }
    .slider-labels {
      display: flex; justify-content: space-between;
      font-size: 11px; color: #aaa; padding-top: 8px;
      margin-bottom: 36px; font-family: 'Inter', sans-serif;
    }
    .next-btn {
      display: block; width: 100%; padding: 16px;
      background: #007aff; color: #fff;
      border: none; border-radius: 16px;
      font-size: 16px; font-weight: 600;
      text-align: center; text-decoration: none;
      font-family: 'Inter', sans-serif;
    }
    .home-ind {
      position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      width: 134px; height: 5px;
      background: rgba(0,0,0,0.2); border-radius: 3px; z-index: 30;
    }
  </style>
</head>
<body>
  <div class="iphone">
    <div class="screen">
      <div class="dynamic-island"></div>
      <div class="status-bar">
        <span class="status-time">9:41</span>
        <div class="status-icons">
          <div class="s-sig"></div><div class="s-wifi"></div><div class="s-bat"></div>
        </div>
      </div>
      <a class="back-btn" href="priorities.html">Back</a>
      <div class="content">
        <div class="step-label">Step 2 of 5</div>
        <div class="heading">How comfortable are you with financial risk?</div>
        <div class="subheading">Drag the slider to reflect your comfort level.</div>
        <div class="risk-display">
          <div class="risk-label" id="riskLabel">Balanced</div>
          <div class="risk-desc"  id="riskDesc">You're comfortable with moderate risk in exchange for moderate growth.</div>
        </div>
        <div class="slider-wrap">
          <input type="range" id="slider" min="0" max="100" value="50" oninput="update(this.value)"/>
        </div>
        <div class="slider-labels">
          <span>Cautious</span>
          <span>Balanced</span>
          <span>Growth</span>
        </div>
        <a href="health.html" class="next-btn">Next</a>
      </div>
      <div class="home-ind"></div>
    </div>
  </div>
  <script>
    const levels = [
      { label: 'Very Cautious', desc: 'You prefer stability and protecting what you have.', color: '#34c759' },
      { label: 'Cautious',      desc: 'You lean toward safety with modest growth.', color: '#30d158' },
      { label: 'Balanced',      desc: "You're comfortable with moderate risk for moderate growth.", color: '#007aff' },
      { label: 'Growth',        desc: 'You prioritize growth and can handle some market swings.', color: '#ff9f0a' },
      { label: 'Aggressive',    desc: 'You want maximum growth and are comfortable with high risk.', color: '#ff3b30' },
    ];
    function update(val) {
      const v = parseInt(val);
      const idx = v <= 20 ? 0 : v <= 40 ? 1 : v <= 60 ? 2 : v <= 80 ? 3 : 4;
      const l = levels[idx];
      document.getElementById('riskLabel').textContent = l.label;
      document.getElementById('riskDesc').textContent  = l.desc;
      document.getElementById('slider').style.background =
        `linear-gradient(to right, ${l.color} ${v}%, #e0e0e5 ${v}%)`;
    }
    update(50);
  </script>
</body>
</html>
